name: Refresh dummyCookie

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-cookie:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run update script
        env:
          ROBLOSECURITY_USERNAME: ${{ secrets.ROBLOSECURITY_USERNAME }}
          ROBLOSECURITY_PASSWORD: ${{ secrets.ROBLOSECURITY_PASSWORD }}
        run: python .github/scripts/update_cookie.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Data.json
          git diff --staged --quiet || git commit -m "Automatically refresh dummyCookie"
          git push